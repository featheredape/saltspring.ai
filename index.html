<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>saltspring.ai | Empowering Agency</title>
        <meta
            name="description"
            content="A five-day AI workshop on Salt Spring Island, July 7 to 11, 2026. Visualization, motion, sound, data, and art."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --forest: #2d4a3e;
                --moss: #5b7f6e;
                --sage: #8fae8b;
                --sand: #e8dcc8;
                --cream: #f5f0e8;
                --warm-white: #fdfcf9;
                --ocean: #3b6b7c;
                --clay: #c4896e;
                --charcoal: #2a2a28;
                --text-light: #6b6b68;
            }

            html,
            body {
                height: 100%;
                font-family: "Inter", sans-serif;
                overflow: hidden;
            }

            h1 {
                font-family: "DM Serif Display", serif;
                font-weight: 400;
            }

            .page {
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                position: relative;
                padding: 2rem;
                background: linear-gradient(
                    170deg,
                    var(--forest) 0%,
                    #3a5f50 40%,
                    var(--ocean) 100%
                );
            }

            .bg {
                position: absolute;
                inset: 0;
                z-index: 0;
            }
            .bg canvas {
                width: 100%;
                height: 100%;
            }

            .content {
                position: relative;
                z-index: 2;
                max-width: 680px;
            }

            .content > * {
                opacity: 0;
                transform: translateY(18px);
                animation: fadeUp 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }

            .content > *:nth-child(1) { animation-delay: 0.1s; }
            .content > *:nth-child(2) { animation-delay: 0.3s; }
            .content > *:nth-child(3) { animation-delay: 0.55s; }
            .content > *:nth-child(4) { animation-delay: 0.75s; }
            .content > *:nth-child(5) { animation-delay: 0.95s; }
            .content > *:nth-child(6) { animation-delay: 1.1s; }
            .content > *:nth-child(7) { animation-delay: 1.25s; }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(18px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .badge {
                display: inline-block;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.72rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: var(--sage);
                border: 1px solid rgba(143, 174, 139, 0.3);
                padding: 0.45rem 1.1rem;
                border-radius: 100px;
                margin-bottom: 2.2rem;
                background: rgba(45, 74, 62, 0.25);
                backdrop-filter: blur(4px);
            }

            h1 {
                font-size: clamp(2.8rem, 7vw, 5.2rem);
                color: var(--cream);
                line-height: 1.05;
                margin-bottom: 0.25em;
                letter-spacing: -0.02em;
            }

            h1 em {
                font-style: italic;
                color: var(--sage);
            }

            .sub {
                font-size: clamp(0.95rem, 2.2vw, 1.15rem);
                color: rgba(232, 220, 200, 0.65);
                font-weight: 300;
                max-width: 500px;
                margin: 0 auto 2rem;
                line-height: 1.75;
            }

            .date {
                font-family: "JetBrains Mono", monospace;
                font-size: 1.05rem;
                color: var(--sand);
                letter-spacing: 0.05em;
                margin-bottom: 2.2rem;
            }

            .date span {
                color: var(--clay);
                font-weight: 500;
            }

            .tracks {
                display: flex;
                gap: 0.6rem;
                justify-content: center;
                flex-wrap: wrap;
                margin-bottom: 2.8rem;
            }

            .track-pill {
                font-family: "JetBrains Mono", monospace;
                font-size: 0.7rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 0.4rem 1rem;
                border-radius: 100px;
                transition: opacity 0.3s;
            }

            .track-pill:nth-child(1) {
                border: 1px solid rgba(110, 180, 200, 0.6);
                color: rgba(130, 200, 220, 1);
                background: rgba(80, 140, 165, 0.18);
            }
            .track-pill:nth-child(2) {
                border: 1px solid rgba(160, 195, 155, 0.6);
                color: rgba(170, 210, 165, 1);
                background: rgba(143, 174, 139, 0.18);
            }
            .track-pill:nth-child(3) {
                border: 1px solid rgba(215, 155, 125, 0.6);
                color: rgba(225, 165, 130, 1);
                background: rgba(196, 137, 110, 0.18);
            }
            .track-pill:nth-child(4) {
                border: 1px solid rgba(232, 220, 200, 0.45);
                color: rgba(240, 230, 215, 0.95);
                background: rgba(232, 220, 200, 0.12);
            }

            .cta {
                font-family: "Inter", sans-serif;
                font-size: 0.85rem;
                color: rgba(232, 220, 200, 0.35);
                letter-spacing: 0.03em;
            }

            .contact {
                display: inline-block;
                margin-top: 1.2rem;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.72rem;
                color: rgba(232, 220, 200, 0.3);
                text-decoration: none;
                letter-spacing: 0.03em;
                transition: color 0.3s;
            }

            .contact:hover {
                color: rgba(232, 220, 200, 0.6);
            }

            .brand {
                position: absolute;
                bottom: 2rem;
                left: 2.5rem;
                z-index: 2;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.68rem;
                color: rgba(232, 220, 200, 0.15);
                letter-spacing: 0.05em;
            }

            @media (max-width: 480px) {
                .tracks {
                    gap: 0.4rem;
                }
                .brand {
                    bottom: 1.5rem;
                    left: 50%;
                    transform: translateX(-50%);
                }
            }
        </style>
    </head>
    <body>
        <div class="page">
            <div class="bg"><canvas id="c"></canvas></div>
            <div class="brand">saltspring.ai</div>
            <div class="content">
                <div class="badge">Salt Spring Island &middot; Summer 2026</div>
                <h1>Empowering<br /><em>Agency</em></h1>
                <p class="sub">
                    A five-day workshop exploring how AI can empower anyone to
                    address local problems, capped off with a curated art show.
                </p>
                <div class="date"><span>July 7 to 11, 2026</span></div>
                <div class="tracks">
                    <span class="track-pill">Visualization</span>
                    <span class="track-pill">Motion</span>
                    <span class="track-pill">Sound</span>
                    <span class="track-pill">Data</span>
                </div>
                <p class="cta">Applications opening soon</p>
                <a class="contact" href="mailto:shack-easily-colt@duck.com"
                    >Get in touch</a
                >
            </div>
        </div>

        <script>
            const canvas = document.getElementById("c");
            const ctx = canvas.getContext("2d");
            let w,
                h,
                particles = [];

            function resize() {
                w = canvas.width = canvas.offsetWidth;
                h = canvas.height = canvas.offsetHeight;
            }

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2.2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.12;
                    this.speedY = (Math.random() - 0.5) * 0.12;
                    this.opacity = Math.random() * 0.2 + 0.03;
                    this.life = Math.random() * 500 + 300;
                    this.maxLife = this.life;
                }
                update() {
                    this.x +=
                        this.speedX +
                        Math.sin(this.y * 0.003 + Date.now() * 0.00015) * 0.08;
                    this.y +=
                        this.speedY +
                        Math.cos(this.x * 0.003 + Date.now() * 0.00012) * 0.06;
                    this.life--;
                    if (
                        this.life <= 0 ||
                        this.x < -20 ||
                        this.x > w + 20 ||
                        this.y < -20 ||
                        this.y > h + 20
                    )
                        this.reset();
                }
                draw() {
                    const fade = Math.min(
                        1,
                        this.life / 60,
                        (this.maxLife - this.life) / 60,
                    );
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(143, 174, 139, ${this.opacity * fade})`;
                    ctx.fill();
                }
            }

            function init() {
                particles = [];
                const count = Math.min(45, Math.floor((w * h) / 20000));
                for (let i = 0; i < count; i++) particles.push(new Particle());
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 110) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(143, 174, 139, ${(1 - dist / 110) * 0.06})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener("resize", () => {
                resize();
                init();
            });
            resize();
            init();
            draw();
        </script>
    </body>
</html>
